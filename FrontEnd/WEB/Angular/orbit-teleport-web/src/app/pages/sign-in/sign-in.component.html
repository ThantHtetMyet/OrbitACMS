<section class="page">
  <div class="bg-anim" aria-hidden="true">
    <span class="bubble b1"></span>
    <span class="bubble b2"></span>
    <span class="bubble b3"></span>
    <span class="bubble b4"></span>
    <span class="bubble b5"></span>
    <span class="bubble b6"></span>
  </div>

  <form class="card">
    <div class="brand-stack">
      <app-brand-logo text="entral Teleport" size="lg" />
    </div>

    <label for="userId">UserID</label>
    <input id="userId" type="text" placeholder="Enter your UserID" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" />

    <button type="button" class="btn btn-primary">Sign In</button>
    <div class="links">
      <a class="link" href="#">Forgot UserID/Password</a>
      <a class="link" routerLink="/sign-up">Create account</a>
    </div>
  </form>
</section>
