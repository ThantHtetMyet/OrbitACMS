<section class="page">
  <div class="bg-anim" aria-hidden="true">
    <span class="bubble b1"></span>
    <span class="bubble b2"></span>
    <span class="bubble b3"></span>
    <span class="bubble b4"></span>
  </div>

  <form class="card">
    <div class="brand-stack">
      <app-brand-logo text="entral Teleport" size="lg" />
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="firstName">FirstName</label>
        <input id="firstName" type="text" placeholder="Enter your first name" />
      </div>

      <div class="field">
        <label for="lastName">LastName</label>
        <input id="lastName" type="text" placeholder="Enter your last name" />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>

      <div class="field">
        <label for="phoneNo">PhoneNo</label>
        <input id="phoneNo" type="tel" placeholder="Enter your phone number" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Create password" />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Confirm your password" />
      </div>
    </div>

    <button type="button" class="btn btn-primary">Sign Up</button>
    <div class="links">
      <a class="link" routerLink="/sign-in">Already have account? Sign In</a>
      <a class="link" href="#">Need help?</a>
    </div>
  </form>
</section>
