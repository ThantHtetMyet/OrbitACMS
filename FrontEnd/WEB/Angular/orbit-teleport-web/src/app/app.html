@if (!isSignInPage()) {
  <header class="top-bar">
    <a class="brand" routerLink="/login">
      <app-brand-logo [text]="title" size="sm" />
    </a>
    <div class="right-actions">
      <nav class="links">
        <a routerLink="/login">Login</a>
        <a routerLink="/sign-in">Sign In</a>
        <a routerLink="/sign-up">Sign Up</a>
      </nav>
      <app-theme-toggle />
    </div>
  </header>
}

<main class="content" [class.content-full]="isSignInPage()">
  <router-outlet />
</main>
